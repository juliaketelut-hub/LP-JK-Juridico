// ─── SQL SCHEMA GUIDE ────────────────────────────────────────
const SQL_SCHEMA = `-- 1. Tabela de perfis
create table profiles (
  id uuid references auth.users on delete cascade primary key,
  name text not null,
  role text default 'member',
  avatar text
);

-- 2. Tabela de produtos (com campo visibility)
create table products (
  id serial primary key,
  title text not null,
  subtitle text,
  category text,
  thumb text,
  visibility text default 'privado', -- 'publico' | 'privado'
  modules jsonb default '[]'
);

-- 3. Controle de acesso (para produtos privados)
create table member_products (
  member_id uuid references profiles(id) on delete cascade,
  product_id int references products(id) on delete cascade,
  primary key (member_id, product_id)
);

-- 4. Habilitar RLS
alter table profiles enable row level security;
alter table products enable row level security;
alter table member_products enable row level security;

-- 5. Políticas
create policy "Leitura próprio perfil" on profiles
  for select using (auth.uid() = id);

create policy "Admin lê todos os perfis" on profiles
  for all using (
    exists(select 1 from profiles where id = auth.uid() and role='admin')
  );

create policy "Produtos públicos visíveis a todos" on products
  for select using (
    visibility = 'publico' or
    exists(select 1 from profiles where id = auth.uid() and role='admin') or
    exists(select 1 from member_products where member_id = auth.uid() and product_id = id)
  );

create policy "Admin gerencia produtos" on products
  for all using (
    exists(select 1 from profiles where id = auth.uid() and role='admin')
  );

create policy "Ver próprios acessos" on member_products
  for select using (
    member_id = auth.uid() or
    exists(select 1 from profiles where id = auth.uid() and role='admin')
  );

create policy "Admin gerencia acessos" on member_products
  for all using (
    exists(select 1 from profiles where id = auth.uid() and role='admin')
  );

-- 6. Criar admin (após criar usuário no Auth)
insert into profiles (id, name, role, avatar)
values ('SEU-UUID-AQUI', 'Julia Ketelut', 'admin', 'JK');`;

// ─── AUTH SERVICE ────────────────────────────────────────────
const authService = {
  async login(email, password) {
    if (!IS_CONFIGURED) {
      const u = DEMO_USERS.find(u => u.email === email && u.password === password);
      if (!u) throw new Error("E-mail ou senha incorretos.");
      const userProds = u.role === "admin"
        ? DEMO_PRODUCTS
        : DEMO_PRODUCTS.filter(p => p.visibility === "publico" || u.products?.includes(p.id));
      return { user: u, products: userProds };
    }
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw new Error(error.message === "Email not confirmed" ? "E-mail não confirmado. Peça à administradora para recriar seu acesso." : "E-mail ou senha incorretos.");
    const { data: profile } = await sb.from("profiles").select("*").eq("id", data.user.id).single();
    if (!profile) throw new Error("Perfil não encontrado.");
    let products = [];
    if (profile.role === "admin") {
      const { data: all } = await sb.from("products").select("*");
      products = all || [];
    } else {
      const { data: pubProds } = await sb.from("products").select("*").eq("visibility", "publico");
      const { data: access } = await sb.from("member_products").select("product_id, report_url").eq("member_id", profile.id);
      const privateIds = (access || []).map(a => a.product_id);
      const { data: privProds } = privateIds.length
        ? await sb.from("products").select("*").in("id", privateIds)
        : { data: [] };
      const seen = new Set();
      products = [...(pubProds || []), ...(privProds || [])].filter(p => { if (seen.has(p.id)) return false; seen.add(p.id); return true; })
        .map(p => { const a=(access||[]).find(x=>x.product_id===p.id); return a?.report_url?{...p,report_url:a.report_url}:p; });
    }
    return { user: { ...profile, email }, products };
  },
  async logout() { if (IS_CONFIGURED) await sb.auth.signOut(); },
  async getMembers() {
    if (!IS_CONFIGURED) return DEMO_USERS.filter(u => u.role==="member").map(u => ({ ...u, productIds: u.products||[] }));
    const { data: profiles } = await sb.from("profiles").select("*").eq("role","member");
    const { data: access } = await sb.from("member_products").select("*");
    return (profiles||[]).map(p => ({ ...p,
      productIds:(access||[]).filter(a=>a.member_id===p.id).map(a=>a.product_id),
      reportUrls: Object.fromEntries((access||[]).filter(a=>a.member_id===p.id&&a.report_url).map(a=>[a.product_id,a.report_url]))
    }));
  },
  async toggleAccess(memberId, productId, currentlyHas) {
    if (!IS_CONFIGURED) return;
    if (currentlyHas) await sb.from("member_products").delete().eq("member_id",memberId).eq("product_id",productId);
    else await sb.from("member_products").insert({ member_id:memberId, product_id:productId });
  },
  async setReportUrl(memberId, productId, url) {
    if (!IS_CONFIGURED) return;
    await sb.from("member_products").update({ report_url: url||null }).eq("member_id",memberId).eq("product_id",productId);
  },
  async createMember(name, email, password) {
    if (!IS_CONFIGURED) {
      const initials = name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
      return { id:String(Date.now()), name, email, role:"member", avatar:initials, productIds:[] };
    }
    // Passa o nome nos metadados — a trigger on_auth_user_created cria o perfil automaticamente
    const { data, error } = await sb.auth.signUp({ email, password, options: { data: { name } } });
    if (error) throw new Error(error.message);
    const user = data.user;
    if (!user) throw new Error("Verifique o e-mail para confirmar a conta.");
    const initials = name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
    return { id:user.id, name, email, role:"member", avatar:initials, productIds:[] };
  },
  async removeMember(id) { if (IS_CONFIGURED) await sb.from("profiles").delete().eq("id",id); },
};

const Admin = ({ products:initProds, onProductsUpdate }) => {
  const [tab,setTab]=useState("members");
  const [members,setMembers]=useState([]);
  const [products,setProducts]=useState(initProds||[]);
  const [sel,setSel]=useState(null);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({name:"",email:"",password:""});
  const [formErr,setFormErr]=useState("");
  const [loading,setLoading]=useState(true);
  const [prodModal,setProdModal]=useState(false);
  const [prodForm,setProdForm]=useState({title:"",subtitle:"",category:"Consultoria",thumb:"visual-law",visibility:"privado"});
  const [prodErr,setProdErr]=useState("");
  const [modModal,setModModal]=useState(null);
  const [modForm,setModForm]=useState({title:""});
  const [lesModal,setLesModal]=useState(null);
  const [lesForm,setLesForm]=useState({title:"",duration:"",type:"video",url:""});
  const [expandedProd,setExpandedProd]=useState(null);
  const [reportEdits,setReportEdits]=useState({});

  useEffect(()=>{ authService.getMembers().then(m=>{setMembers(m);setLoading(false);}); },[]);
  useEffect(()=>{ if(IS_CONFIGURED) sb.from("products").select("*").then(({data})=>{if(data)setProducts(data);}); },[]);

  const updateMods = async (pid,modules) => {
    const updated = products.map(p=>p.id===pid?{...p,modules}:p);
    setProducts(updated);
    if(onProductsUpdate) onProductsUpdate(updated);
    if(IS_CONFIGURED) await sb.from("products").update({modules}).eq("id",pid);
  };
  const addProduct = async () => {
    if(!prodForm.title){setProdErr("Título obrigatório.");return;}
    const obj={...prodForm,modules:[]};
    if(IS_CONFIGURED){
      const {data}=await sb.from("products").insert(obj).select().single();
      if(data)setProducts(prev=>[...prev,data]);
    } else setProducts(prev=>[...prev,{id:Date.now(),...obj}]);
    setProdForm({title:"",subtitle:"",category:"Consultoria",thumb:"visual-law",visibility:"privado"});
    setProdErr("");setProdModal(false);
  };
  const delProduct = async (id) => {
    if(!confirm("Remover produto e todos os acessos?"))return;
    if(IS_CONFIGURED)await sb.from("products").delete().eq("id",id);
    setProducts(prev=>prev.filter(p=>p.id!==id));
  };
  const toggleVisibility = async (prod) => {
    const newVis = prod.visibility==="publico"?"privado":"publico";
    if(IS_CONFIGURED)await sb.from("products").update({visibility:newVis}).eq("id",prod.id);
    setProducts(prev=>prev.map(p=>p.id===prod.id?{...p,visibility:newVis}:p));
  };
  const addModule = async () => {
    if(!modForm.title)return;
    const p=products.find(x=>x.id===modModal);
    await updateMods(modModal,[...(p.modules||[]),{id:Date.now(),title:modForm.title,lessons:[]}]);
    setModForm({title:""});setModModal(null);
  };
  const delModule = async (pid,mid) => {
    const p=products.find(x=>x.id===pid);
    await updateMods(pid,(p.modules||[]).filter(m=>m.id!==mid));
  };
  const addLesson = async () => {
    if(!lesForm.title||!lesForm.duration)return;
    const {pid,mid,lesEditId}=lesModal;
    const p=products.find(x=>x.id===pid);
    let mods;
    if(lesEditId) {
      mods=(p.modules||[]).map(m=>m.id===mid?{...m,lessons:(m.lessons||[]).map(l=>l.id===lesEditId?{...l,...lesForm}:l)}:m);
    } else {
      mods=(p.modules||[]).map(m=>m.id===mid?{...m,lessons:[...(m.lessons||[]),{id:Date.now(),...lesForm,watched:false}]}:m);
    }
    await updateMods(pid,mods);
    setLesForm({title:"",duration:"",type:"video",url:""});setLesModal(null);
  };
  const delLesson = async (pid,mid,lid) => {
    const p=products.find(x=>x.id===pid);
    await updateMods(pid,(p.modules||[]).map(m=>m.id===mid?{...m,lessons:(m.lessons||[]).filter(l=>l.id!==lid)}:m));
  };
  const toggle = async (mId,pId) => {
    const m=members.find(x=>x.id===mId);const has=m?.productIds?.includes(pId);
    await authService.toggleAccess(mId,pId,has);
    setMembers(prev=>prev.map(x=>x.id!==mId?x:{...x,productIds:has?x.productIds.filter(id=>id!==pId):[...(x.productIds||[]),pId]}));
    if(sel?.id===mId)setSel(prev=>({...prev,productIds:has?prev.productIds.filter(id=>id!==pId):[...(prev.productIds||[]),pId]}));
  };
  const remove = async (id) => { await authService.removeMember(id);setMembers(prev=>prev.filter(m=>m.id!==id));if(sel?.id===id)setSel(null); };
  const add = async () => {
    if(!form.name||!form.email||!form.password){setFormErr("Preencha todos os campos.");return;}
    if(form.password.length<6){setFormErr("Senha mínima: 6 caracteres.");return;}
    try{const m=await authService.createMember(form.name,form.email,form.password);setMembers(prev=>[...prev,m]);setForm({name:"",email:"",password:""});setFormErr("");setModal(false);}
    catch(ex){setFormErr(ex.message);}
  };

  const saveReport = async (mId,pId,url) => {
    await authService.setReportUrl(mId,pId,url);
    const v=url||undefined;
    setSel(prev=>prev?{...prev,reportUrls:{...(prev.reportUrls||{}),[pId]:v}}:prev);
    setMembers(prev=>prev.map(m=>m.id===mId?{...m,reportUrls:{...(m.reportUrls||{}),[pId]:v}}:m));
  };

  const totalAulas = products.reduce((s,p)=>s+(p.modules||[]).reduce((ss,m)=>ss+(m.lessons?.length||0),0),0);
  const privProducts = products.filter(p=>p.visibility!=="publico");

  return (
    <div style={{ flex:1,overflowY:"auto",padding:"28px 32px" }}>
      <div style={{ maxWidth:940 }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24 }}>
          <div>
            <div style={{ fontFamily:"var(--font-label)", fontSize:"0.60rem", fontWeight:600, letterSpacing:"0.22em", textTransform:"uppercase", color:"var(--gold)", marginBottom:10 }}>Administração</div>
            <h1 style={{ fontFamily:"var(--font-display)", fontSize:"clamp(1.6rem,3vw,2.2rem)", color:"var(--text)", fontWeight:400 }}>Painel Admin</h1>
            <div style={{ width:36, height:"1.5px", background:"var(--gold)", opacity:0.50, borderRadius:1, marginTop:10 }}/>
          </div>
          <Btn gold onClick={()=>tab==="members"?setModal(true):setProdModal(true)}>
            <Icon name="plus" size={14} color="#2C3639"/>{tab==="members"?"Novo membro":"Novo produto"}
          </Btn>
        </div>

        <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:22 }}>
          {[["Membros",members.length,"users"],["Produtos",products.length,"book"],["Aulas",totalAulas,"play"],["Privados",privProducts.length,"lock"]].map(([label,val,icon])=>(
            <div key={label} style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"16px 18px",display:"flex",alignItems:"center",gap:12 }}>
              <div style={{ width:36,height:36,borderRadius:"var(--radius)",background:"var(--gold-dim)",display:"flex",alignItems:"center",justifyContent:"center" }}><Icon name={icon} size={16} color="var(--gold)"/></div>
              <div>
                <div style={{ fontFamily:"var(--font-display)",fontSize:20,color:"var(--text)",lineHeight:1 }}>{val}</div>
                <div style={{ fontFamily:"var(--font-label)",fontSize:10,color:"var(--text-muted)",marginTop:3,letterSpacing:"0.07em" }}>{label.toUpperCase()}</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{ display:"flex",gap:2,marginBottom:18,background:"var(--card)",borderRadius:"var(--radius)",padding:4,width:"fit-content",border:"1px solid var(--border)" }}>
          {[["members","Membros","users"],["products","Produtos","book"]].map(([id,label,icon])=>(
            <button key={id} onClick={()=>setTab(id)} style={{ display:"flex",alignItems:"center",gap:7,padding:"7px 16px",borderRadius:6,border:"none",background:tab===id?"var(--gold)":"none",color:tab===id?"#2C3639":"var(--text-muted)",fontSize:13,fontWeight:tab===id?600:400,cursor:"pointer",fontFamily:"var(--font-sans)",transition:"all var(--transition)" }}>
              <Icon name={icon} size={13} color="currentColor"/>{label}
            </button>
          ))}
        </div>

        {tab==="members" && (
          <div style={{ display:"grid",gridTemplateColumns:sel?"1fr 310px":"1fr",gap:16 }}>
            <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden" }}>
              <div style={{ padding:"12px 16px",borderBottom:"1px solid var(--border)" }}>
                <span style={{ fontFamily:"var(--font-label)",fontSize:10,color:"var(--text-secondary)",letterSpacing:"0.12em" }}>MEMBROS ({members.length})</span>
              </div>
              {loading&&<div style={{ padding:"28px",textAlign:"center",color:"var(--text-muted)",fontSize:13 }}>Carregando...</div>}
              {!loading&&members.length===0&&<div style={{ padding:"28px",textAlign:"center",color:"var(--text-muted)",fontSize:13 }}>Nenhum membro ainda.</div>}
              {members.map((m,i)=>(
                <div key={m.id} onClick={()=>setSel(sel?.id===m.id?null:m)}
                  style={{ display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<members.length-1?"1px solid var(--border)":"none",cursor:"pointer",background:sel?.id===m.id?"var(--gold-dim)":"none",transition:"background var(--transition)" }}
                  onMouseEnter={e=>{if(sel?.id!==m.id)e.currentTarget.style.background="var(--hover-bg)";}} onMouseLeave={e=>{if(sel?.id!==m.id)e.currentTarget.style.background="none";}}>
                  <div style={{ width:32,height:32,borderRadius:"50%",background:"var(--gold-dim)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
                    <span style={{ fontSize:11,fontWeight:600,color:"var(--gold)" }}>{m.avatar||m.name?.slice(0,2).toUpperCase()}</span>
                  </div>
                  <div style={{ flex:1,minWidth:0 }}>
                    <div style={{ fontSize:13,color:"var(--text)",fontWeight:500 }}>{m.name}</div>
                    <div style={{ fontSize:11,color:"var(--text-muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{m.email}</div>
                  </div>
                  <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                    <div style={{ display:"flex",gap:3 }}>{privProducts.map(p=><div key={p.id} title={p.title} style={{ width:7,height:7,borderRadius:"50%",background:(m.productIds||[]).includes(p.id)?"var(--gold)":"var(--border)" }}/>)}</div>
                    <span style={{ fontSize:11,color:"var(--text-muted)" }}>{(m.productIds||[]).length}/{privProducts.length} priv.</span>
                    <button onClick={e=>{e.stopPropagation();remove(m.id);}} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",padding:2 }}
                      onMouseEnter={e=>e.currentTarget.style.color="var(--danger)"} onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>
                      <Icon name="trash" size={13} color="currentColor"/>
                    </button>
                  </div>
                </div>
              ))}
            </div>
            {sel&&(
              <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden" }}>
                <div style={{ padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
                  <div style={{ minWidth:0,flex:1 }}>
                    <div style={{ fontFamily:"var(--font-label)",fontSize:10,color:"var(--text-muted)",letterSpacing:"0.1em" }}>ACESSOS PRIVADOS</div>
                    <div style={{ fontSize:13,fontWeight:500,color:"var(--text)",marginTop:2 }}>{sel.name?.split(" ")[0]}</div>
                    {sel.email && (
                      <div style={{ display:"flex",alignItems:"center",gap:6,marginTop:4 }}>
                        <span style={{ fontSize:11,color:"var(--text-muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:200 }}>{sel.email}</span>
                        <button title="Copiar e-mail" onClick={()=>navigator.clipboard.writeText(sel.email)}
                          style={{ background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",padding:2,flexShrink:0 }}
                          onMouseEnter={e=>e.currentTarget.style.color="var(--gold)"} onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>
                          <Icon name="copy" size={12} color="currentColor"/>
                        </button>
                      </div>
                    )}
                  </div>
                  <button onClick={()=>setSel(null)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:20,lineHeight:1 }}>×</button>
                </div>
                {privProducts.length===0&&<div style={{ padding:"16px",fontSize:12,color:"var(--text-muted)" }}>Nenhum produto privado criado.</div>}
                {privProducts.map(p=>{
                  const has=(sel.productIds||[]).includes(p.id);
                  const rUrl=sel.reportUrls?.[p.id]||"";
                  return (
                    <div key={p.id} style={{ padding:"10px 16px",borderBottom:"1px solid var(--border)" }}>
                      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between" }}>
                        <div>
                          <div style={{ fontFamily:"var(--font-label)",fontSize:9,color:"var(--gold-muted)",letterSpacing:"0.12em",marginBottom:2 }}>{p.category?.toUpperCase()}</div>
                          <div style={{ fontSize:12,color:"var(--text)" }}>{p.title}</div>
                        </div>
                        <button onClick={()=>toggle(sel.id,p.id)} style={{ flexShrink:0,width:40,height:22,borderRadius:11,border:"none",background:has?"var(--gold)":"var(--border)",cursor:"pointer",position:"relative",transition:"background 0.2s" }}>
                          <div style={{ position:"absolute",top:2,left:has?20:2,width:18,height:18,borderRadius:"50%",background:has?"#2C3639":"var(--text-muted)",transition:"left 0.2s" }}/>
                        </button>
                      </div>
                      {has && (
                        <div style={{ marginTop:8 }}>
                          <input type="text" placeholder="URL do relatório — cole e clique fora para salvar"
                            key={`${sel.id}_${p.id}`}
                            defaultValue={rUrl}
                            onFocus={e=>e.currentTarget.style.borderColor="var(--gold-muted)"}
                            onBlur={e=>{ e.currentTarget.style.borderColor="var(--border)"; const v=e.target.value.trim(); if(v!==rUrl)saveReport(sel.id,p.id,v); }}
                            style={{ width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6,padding:"5px 8px",color:"var(--text)",fontSize:10,fontFamily:"var(--font-sans)",outline:"none" }}
                          />
                        </div>
                      )}
                    </div>
                  );
                })}
                <div style={{ padding:"10px 16px",borderTop:"1px solid var(--border)",fontSize:11,color:"var(--text-muted)" }}>
                  Produtos públicos são acessados por todos.
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="products" && (
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {products.length===0&&<div style={{ textAlign:"center",padding:"40px",color:"var(--text-muted)",fontSize:13,background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)" }}>Nenhum produto. Clique em "Novo produto".</div>}
            {products.map(p=>(
              <div key={p.id} style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden" }}>
                <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",cursor:"pointer" }} onClick={()=>setExpandedProd(expandedProd===p.id?null:p.id)}>
                  <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                    <div style={{ transform:expandedProd===p.id?"rotate(180deg)":"none",transition:"transform var(--transition)",color:"var(--text-muted)" }}><Icon name="chevD" size={14}/></div>
                    <div>
                      <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:3 }}>
                        <span style={{ fontFamily:"var(--font-label)",fontSize:9,color:"var(--gold-muted)",letterSpacing:"0.14em" }}>{p.category?.toUpperCase()}</span>
                        <span style={{ display:"inline-flex",alignItems:"center",gap:3,background:p.visibility==="publico"?"#4a7c5a18":"var(--gold-dim)",border:`1px solid ${p.visibility==="publico"?"#4a7c5a44":"var(--gold-muted)"}`,borderRadius:20,padding:"1px 6px" }}>
                          <Icon name={p.visibility==="publico"?"globe":"lock"} size={8} color={p.visibility==="publico"?"#6aad8a":"var(--gold-muted)"}/>
                          <span style={{ fontSize:8,color:p.visibility==="publico"?"#6aad8a":"var(--gold-muted)",fontFamily:"var(--font-label)",letterSpacing:"0.08em" }}>{p.visibility==="publico"?"PÚBLICO":"PRIVADO"}</span>
                        </span>
                      </div>
                      <div style={{ fontSize:14,fontWeight:500,color:"var(--text)" }}>{p.title}</div>
                      <div style={{ fontSize:11,color:"var(--text-muted)" }}>{(p.modules||[]).length} módulos · {(p.modules||[]).reduce((s,m)=>s+(m.lessons?.length||0),0)} aulas</div>
                    </div>
                  </div>
                  <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                    <button onClick={e=>{e.stopPropagation();toggleVisibility(p);}} title="Alternar visibilidade"
                      style={{ background:"none",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"5px 10px",cursor:"pointer",color:"var(--text-muted)",fontSize:11,display:"flex",alignItems:"center",gap:5,fontFamily:"var(--font-sans)" }}
                      onMouseEnter={e=>e.currentTarget.style.borderColor="var(--gold-muted)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
                      <Icon name={p.visibility==="publico"?"lock":"globe"} size={11} color="currentColor"/>
                      {p.visibility==="publico"?"Tornar privado":"Tornar público"}
                    </button>
                    <button onClick={e=>{e.stopPropagation();delProduct(p.id);}} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",padding:4 }}
                      onMouseEnter={e=>e.currentTarget.style.color="var(--danger)"} onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>
                      <Icon name="trash" size={14} color="currentColor"/>
                    </button>
                  </div>
                </div>
                {expandedProd===p.id&&(
                  <div style={{ borderTop:"1px solid var(--border)",padding:"14px 18px" }}>
                    {(p.modules||[]).map(mod=>(
                      <div key={mod.id} style={{ background:"var(--surface)",borderRadius:"var(--radius)",padding:"12px 14px",marginBottom:10 }}>
                        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8 }}>
                          <div style={{ fontSize:13,fontWeight:500,color:"var(--text)" }}>📁 {mod.title}</div>
                          <div style={{ display:"flex",gap:8 }}>
                            <Btn small onClick={()=>setLesModal({pid:p.id,mid:mod.id})}><Icon name="plus" size={11} color="currentColor"/>Aula</Btn>
                            <button onClick={()=>delModule(p.id,mod.id)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",padding:2 }}
                              onMouseEnter={e=>e.currentTarget.style.color="var(--danger)"} onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>
                              <Icon name="trash" size={12} color="currentColor"/>
                            </button>
                          </div>
                        </div>
                        {(mod.lessons||[]).map(l=>(
                          <div key={l.id} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"var(--card)",borderRadius:"var(--radius)",marginBottom:4 }}>
                            <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                              <Icon name={l.type==="video"?"play":"file"} size={12} color="var(--text-muted)"/>
                              <div>
                                <div style={{ fontSize:12,color:"var(--text)" }}>{l.title}</div>
                                <div style={{ fontSize:10,color:"var(--text-muted)" }}>{l.type==="video"?"Vídeo":"Material"} · {l.duration}</div>
                              </div>
                            </div>
                            <div style={{ display:"flex",gap:4 }}>
                              <button title="Editar" onClick={()=>{setLesForm({title:l.title,duration:l.duration,type:l.type||"material",url:l.url||""});setLesModal({pid:p.id,mid:mod.id,lesEditId:l.id});}}
                                style={{ background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",padding:2 }}
                                onMouseEnter={e=>e.currentTarget.style.color="var(--gold)"} onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>
                                <Icon name="edit" size={11} color="currentColor"/>
                              </button>
                              <button title="Excluir" onClick={()=>delLesson(p.id,mod.id,l.id)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",padding:2 }}
                                onMouseEnter={e=>e.currentTarget.style.color="var(--danger)"} onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>
                                <Icon name="trash" size={11} color="currentColor"/>
                              </button>
                            </div>
                          </div>
                        ))}
                        {(mod.lessons||[]).length===0&&<div style={{ fontSize:11,color:"var(--text-muted)",padding:"6px 0" }}>Sem aulas. Clique em "+ Aula".</div>}
                      </div>
                    ))}
                    <Btn onClick={()=>setModModal(p.id)}><Icon name="plus" size={13} color="currentColor"/>Adicionar módulo</Btn>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {modal&&(
        <div style={{ position:"fixed",inset:0,background:"#00000075",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 }} onClick={()=>setModal(false)}>
          <div style={{ background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"24px",width:380,maxWidth:"92vw" }} onClick={e=>e.stopPropagation()}>
            <h2 style={{ fontFamily:"var(--font-display)",fontSize:18,color:"var(--text)",marginBottom:18 }}>Novo membro</h2>
            <Lbl t="NOME COMPLETO"/><Inp val={form.name} set={v=>setForm(p=>({...p,name:v}))} ph="Ex: Maria Silva"/>
            <Lbl t="E-MAIL"/><Inp val={form.email} set={v=>setForm(p=>({...p,email:v}))} ph="maria@email.com" type="email"/>
            <Lbl t="SENHA"/><Inp val={form.password} set={v=>setForm(p=>({...p,password:v}))} ph="Mínimo 6 caracteres" type="password"/>
            {formErr&&<div style={{ fontSize:12,color:"var(--danger)",marginBottom:10 }}>{formErr}</div>}
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={()=>{setModal(false);setFormErr("");}} style={{ flex:1,background:"none",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"10px",color:"var(--text-muted)",fontSize:13,cursor:"pointer" }}>Cancelar</button>
              <button onClick={add} style={{ flex:1,background:"var(--gold)",border:"none",borderRadius:"var(--radius)",padding:"10px",color:"#2C3639",fontSize:13,fontWeight:600,cursor:"pointer" }}>Criar</button>
            </div>
          </div>
        </div>
      )}

      {prodModal&&(
        <div style={{ position:"fixed",inset:0,background:"#00000075",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 }} onClick={()=>setProdModal(false)}>
          <div style={{ background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"24px",width:420,maxWidth:"92vw" }} onClick={e=>e.stopPropagation()}>
            <h2 style={{ fontFamily:"var(--font-display)",fontSize:18,color:"var(--text)",marginBottom:18 }}>Novo produto</h2>
            <Lbl t="TÍTULO"/><Inp val={prodForm.title} set={v=>setProdForm(p=>({...p,title:v}))} ph="Ex: Visual Law — Cliente X"/>
            <Lbl t="DESCRIÇÃO"/><Inp val={prodForm.subtitle} set={v=>setProdForm(p=>({...p,subtitle:v}))} ph="Descrição curta"/>
            <Lbl t="CATEGORIA"/><Sel val={prodForm.category} set={v=>setProdForm(p=>({...p,category:v}))} opts={["Consultoria","Curso","Mini-Curso","Templates","Outros"]}/>
            <Lbl t="VISUAL (thumb)"/><Sel val={prodForm.thumb} set={v=>setProdForm(p=>({...p,thumb:v}))} opts={[{value:"visual-law",label:"Visual Law"},{value:"peticoes",label:"Petições"},{value:"abnt",label:"ABNT"},{value:"consultoria",label:"Consultoria"},{value:"diagnostico",label:"Diagnóstico"}]}/>
            <Lbl t="VISIBILIDADE"/>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10 }}>
              {[{v:"privado",icon:"lock",label:"Privado",desc:"Acesso por convite"},{v:"publico",icon:"globe",label:"Público",desc:"Todos os membros"}].map(opt=>(
                <button key={opt.v} onClick={()=>setProdForm(p=>({...p,visibility:opt.v}))} style={{ background:prodForm.visibility===opt.v?"var(--gold-dim)":"var(--card)",border:`1px solid ${prodForm.visibility===opt.v?"var(--gold)":"var(--border)"}`,borderRadius:"var(--radius)",padding:"10px 12px",cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:4 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:6,color:prodForm.visibility===opt.v?"var(--gold)":"var(--text-muted)" }}><Icon name={opt.icon} size={13} color="currentColor"/><span style={{ fontSize:12,fontWeight:600,fontFamily:"var(--font-sans)" }}>{opt.label}</span></div>
                  <span style={{ fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-label)" }}>{opt.desc}</span>
                </button>
              ))}
            </div>
            {prodErr&&<div style={{ fontSize:12,color:"var(--danger)",marginBottom:10 }}>{prodErr}</div>}
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={()=>{setProdModal(false);setProdErr("");}} style={{ flex:1,background:"none",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"10px",color:"var(--text-muted)",fontSize:13,cursor:"pointer" }}>Cancelar</button>
              <button onClick={addProduct} style={{ flex:1,background:"var(--gold)",border:"none",borderRadius:"var(--radius)",padding:"10px",color:"#2C3639",fontSize:13,fontWeight:600,cursor:"pointer" }}>Criar</button>
            </div>
          </div>
        </div>
      )}

      {modModal&&(
        <div style={{ position:"fixed",inset:0,background:"#00000075",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 }} onClick={()=>setModModal(null)}>
          <div style={{ background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"24px",width:360,maxWidth:"92vw" }} onClick={e=>e.stopPropagation()}>
            <h2 style={{ fontFamily:"var(--font-display)",fontSize:18,color:"var(--text)",marginBottom:16 }}>Novo módulo</h2>
            <Lbl t="NOME DO MÓDULO"/><Inp val={modForm.title} set={v=>setModForm(p=>({...p,title:v}))} ph="Ex: Fundamentos"/>
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={()=>setModModal(null)} style={{ flex:1,background:"none",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"10px",color:"var(--text-muted)",fontSize:13,cursor:"pointer" }}>Cancelar</button>
              <button onClick={addModule} style={{ flex:1,background:"var(--gold)",border:"none",borderRadius:"var(--radius)",padding:"10px",color:"#2C3639",fontSize:13,fontWeight:600,cursor:"pointer" }}>Adicionar</button>
            </div>
          </div>
        </div>
      )}

      {lesModal&&(
        <div style={{ position:"fixed",inset:0,background:"#00000075",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 }} onClick={()=>setLesModal(null)}>
          <div style={{ background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"24px",width:400,maxWidth:"92vw" }} onClick={e=>e.stopPropagation()}>
            <h2 style={{ fontFamily:"var(--font-display)",fontSize:18,color:"var(--text)",marginBottom:16 }}>{lesModal?.lesEditId?"Editar aula / material":"Nova aula / material"}</h2>
            <Lbl t="TÍTULO"/><Inp val={lesForm.title} set={v=>setLesForm(p=>({...p,title:v}))} ph="Ex: Introdução ao Visual Law"/>
            <Lbl t="DURAÇÃO / FORMATO"/><Inp val={lesForm.duration} set={v=>setLesForm(p=>({...p,duration:v}))} ph="Ex: 18min / PDF / DOCX / Leitura"/>
            <Lbl t="TIPO"/><Sel val={lesForm.type} set={v=>setLesForm(p=>({...p,type:v}))} opts={[{value:"video",label:"Vídeo"},{value:"material",label:"Material / Download"}]}/>
            <Lbl t={lesForm.type==="video"?"LINK DO VÍDEO (YouTube ou Vimeo)":"LINK DO MATERIAL ou E-MAIL"}/>
            <Inp val={lesForm.url} set={v=>setLesForm(p=>({...p,url:v}))} ph={lesForm.type==="video"?"https://youtu.be/...":"https://drive.google.com/... ou mailto:julia@gmail.com?subject=..."}/>
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={()=>setLesModal(null)} style={{ flex:1,background:"none",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"10px",color:"var(--text-muted)",fontSize:13,cursor:"pointer" }}>Cancelar</button>
              <button onClick={addLesson} style={{ flex:1,background:"var(--gold)",border:"none",borderRadius:"var(--radius)",padding:"10px",color:"#2C3639",fontSize:13,fontWeight:600,cursor:"pointer" }}>{lesModal?.lesEditId?"Salvar alterações":"Adicionar"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── ACCOUNT ────────────────────────────────────────────────
const Account = ({ user }) => {
  const [pwForm,setPwForm]=useState({current:"",next:"",confirm:""});
  const [pwErr,setPwErr]=useState(""); const [pwOk,setPwOk]=useState(false); const [pwLoading,setPwLoading]=useState(false);
  const changePw = async () => {
    setPwErr("");setPwOk(false);
    if(!pwForm.current||!pwForm.next||!pwForm.confirm){setPwErr("Preencha todos os campos.");return;}
    if(pwForm.next.length<6){setPwErr("Nova senha: mínimo 6 caracteres.");return;}
    if(pwForm.next!==pwForm.confirm){setPwErr("As senhas não coincidem.");return;}
    setPwLoading(true);
    try {
      if(IS_CONFIGURED){
        const {error:signInErr}=await sb.auth.signInWithPassword({email:user.email,password:pwForm.current});
        if(signInErr)throw new Error("Senha atual incorreta.");
        const {error}=await sb.auth.updateUser({password:pwForm.next});
        if(error)throw new Error(error.message);
      }
      setPwOk(true);setPwForm({current:"",next:"",confirm:""});
    } catch(ex){setPwErr(ex.message);}
    setPwLoading(false);
  };
  return (
    <div style={{ flex:1,overflowY:"auto",padding:"28px 32px" }}>
      <div style={{ maxWidth:520 }}>
        <div style={{ marginBottom:32, paddingBottom:24, borderBottom:"1px solid var(--border)" }}>
        <div style={{ fontFamily:"var(--font-label)", fontSize:"0.60rem", fontWeight:600, letterSpacing:"0.22em", textTransform:"uppercase", color:"var(--gold)", marginBottom:10 }}>Perfil</div>
        <h1 style={{ fontFamily:"var(--font-display)", fontSize:"clamp(1.6rem,3vw,2.2rem)", color:"var(--text)", fontWeight:400, lineHeight:1.15 }}>Minha Conta</h1>
        <div style={{ width:36, height:"1.5px", background:"var(--gold)", opacity:0.50, borderRadius:1, marginTop:12 }}/>
      </div>
        <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:22,marginBottom:16 }}>
          <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:18,paddingBottom:18,borderBottom:"1px solid var(--border)" }}>
            <div style={{ width:48,height:48,borderRadius:"50%",background:"var(--gold-dim)",display:"flex",alignItems:"center",justifyContent:"center" }}>
              <span style={{ fontSize:16,fontWeight:600,color:"var(--gold)" }}>{user.avatar||user.name?.slice(0,2).toUpperCase()}</span>
            </div>
            <div>
              <div style={{ fontFamily:"var(--font-display)",fontSize:15,color:"var(--text)" }}>{user.name}</div>
              <div style={{ fontSize:12,color:"var(--text-muted)" }}>{user.role==="admin"?"Administrador":"Membro"}</div>
            </div>
          </div>
          {[["Nome",user.name],["E-mail",user.email],["Acesso",user.role==="admin"?"Administrador":"Membro"]].map(([l,v])=>(
            <div key={l} style={{ display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid var(--border)" }}>
              <span style={{ fontSize:13,color:"var(--text-muted)" }}>{l}</span>
              <span style={{ fontSize:13,color:"var(--text)" }}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:22 }}>
          <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:16 }}>
            <Icon name="shield" size={15} color="var(--gold-muted)"/>
            <span style={{ fontFamily:"var(--font-display)",fontSize:15,color:"var(--text)" }}>Trocar senha</span>
          </div>
          <PwInp ph="Senha atual" val={pwForm.current} set={v=>setPwForm(p=>({...p,current:v}))}/>
          <PwInp ph="Nova senha" val={pwForm.next} set={v=>setPwForm(p=>({...p,next:v}))}/>
          <PwInp ph="Confirmar nova senha" val={pwForm.confirm} set={v=>setPwForm(p=>({...p,confirm:v}))}/>
          {pwErr&&<p style={{ fontSize:12,color:"var(--danger)",marginBottom:10 }}>{pwErr}</p>}
          {pwOk&&<p style={{ fontSize:12,color:"var(--green)",marginBottom:10 }}>Senha alterada com sucesso!</p>}
          <button onClick={changePw} disabled={pwLoading} style={{ width:"100%",background:"var(--gold)",border:"none",borderRadius:"var(--radius)",padding:"11px",color:"#2C3639",fontSize:13,fontWeight:600,cursor:pwLoading?"not-allowed":"pointer",opacity:pwLoading?0.7:1 }}>
            {pwLoading?"Salvando...":"Salvar nova senha"}
          </button>
        </div>
      </div>
    </div>
  );
};

// ─── HELP ────────────────────────────────────────────────────

  <div style={{ flex:1,overflowY:"auto",padding:"28px 32px" }}>
    <div style={{ maxWidth:520 }}>
      <div style={{ marginBottom:28, paddingBottom:24, borderBottom:"1px solid var(--border)" }}>
        <div style={{ fontFamily:"var(--font-label)", fontSize:"0.60rem", fontWeight:600, letterSpacing:"0.22em", textTransform:"uppercase", color:"var(--gold)", marginBottom:10 }}>Suporte</div>
        <h1 style={{ fontFamily:"var(--font-display)", fontSize:"clamp(1.6rem,3vw,2.2rem)", color:"var(--text)", fontWeight:400, lineHeight:1.15 }}>Ajuda</h1>
        <div style={{ width:36, height:"1.5px", background:"var(--gold)", opacity:0.50, borderRadius:1, marginTop:12 }}/>
      </div>
      {[
        ["Como acesso meus produtos?","Clique em 'Meus Produtos' no menu lateral para ver seus cursos e materiais ativos."],
        ["Não estou vendo um produto?","Produtos privados precisam ser liberados manualmente. Entre em contato para solicitar acesso."],
        ["Como baixo materiais?","Dentro do produto, clique na aula/material desejado. Haverá um botão de download."],

      ))}
      <div style={{ marginTop:20,padding:"18px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",textAlign:"center" }}>
        <p style={{ fontSize:12,color:"var(--text-muted)",marginBottom:12 }}>Não encontrou o que precisava?</p>
        <a href="mailto:juliaketelut.juridico@gmail.com" style={{ background:"var(--gold)",borderRadius:"var(--radius)",padding:"10px 18px",color:"#2C3639",fontSize:13,fontWeight:600,textDecoration:"none",display:"inline-block" }}>Falar com o suporte</a>
      </div>
    </div>
  </div>
);

// ─── APP ────────────────────────────────────────────────────
const App = () => {
  const [session,setSession]=useState(null);
  const [view,setView]=useState("dashboard");
  const [activeProduct,setActiveProduct]=useState(null);
  const [activeModule,setActiveModule]=useState(null);
  const [activeLesson,setActiveLesson]=useState(null);
  const [showSetup,setShowSetup]=useState(false);
  const [availableProducts,setAvailableProducts]=useState([]);
  const [toast,setToast]=useState(null);
  const [theme,setTheme]=useState(()=>localStorage.getItem("jk-theme")||"light");

  React.useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
    localStorage.setItem("jk-theme",theme);
  },[theme]);

  const handleToggleTheme = () => setTheme(t=>t==="dark"?"light":"dark");

  const handleLogin = async ({user,products}) => {
    setSession({user,products});
    if(sb && user.role!=="admin"){
      const {data:forSale} = await sb.from("products").select("*").eq("visibility","privado").gt("price",0);
      const ownedIds = new Set(products.map(p=>p.id));
      setAvailableProducts((forSale||[]).filter(p=>!ownedIds.has(p.id)));
    }
  };
  const handleLogout = async () => { await authService.logout(); setSession(null);setView("dashboard");setAvailableProducts([]); };
  const handleNav = (v) => { setView(v); if(!["product","lesson"].includes(v)){setActiveProduct(null);setActiveLesson(null);} };
  const handleOpenProduct = (p) => { setActiveProduct(p);setView("product"); };
  const handleOpenLesson = (product,mod,lesson) => { setActiveProduct(product);setActiveModule(mod);setActiveLesson(lesson);setView("lesson"); };
  const handleNavLesson = (lesson) => {
    const mod=(activeProduct?.modules||[]).find(m=>(m.lessons||[]).some(l=>l.id===lesson.id));
    setActiveModule(mod);setActiveLesson(lesson);
  };

  React.useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    if(params.get("compra")==="sucesso"){
      setToast("Pagamento confirmado! Seu acesso será liberado em instantes.");
      window.history.replaceState({},"",window.location.pathname);
      setTimeout(()=>setToast(null),7000);
    }
  },[]);

  const handlePurchase = async (product_id) => {
    if(!sb) return alert("Modo demo: pagamentos requerem Supabase configurado.");
    const {data:{session:sbSession}} = await sb.auth.getSession();
    const token = sbSession?.access_token;
    if(!token) return;
    const res = await fetch(`${SUPABASE_URL}/functions/v1/create-payment-link`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${token}`,"Content-Type":"application/json"},
      body:JSON.stringify({product_id})
    });
    const data = await res.json();
    if(data.payment_url) window.location.href = data.payment_url;
    else {
      const detail = data.details ? "\n\nDetalhe: "+JSON.stringify(data.details) : (data.error ? "\n\nErro: "+data.error : "");
      alert("Não foi possível gerar o link de pagamento. Tente novamente."+detail);
    }
  };

  if(!session) return (
    <>
      <Login onLogin={handleLogin} onShowSetup={()=>setShowSetup(true)}/>
      {showSetup&&<SetupGuide onClose={()=>setShowSetup(false)}/>}
    </>
  );

  const {user,products}=session;

  return (
    <div style={{ display:"flex",height:"100vh",overflow:"hidden" }}>
      <Sidebar user={user} view={view} onNav={handleNav} onLogout={handleLogout} onShowSetup={()=>setShowSetup(true)} theme={theme} onToggleTheme={handleToggleTheme}/>
      {view==="dashboard"&&<Dashboard user={user} products={products} availableProducts={availableProducts} onOpen={handleOpenProduct} onPurchase={handlePurchase}/>}
      {view==="product"&&activeProduct&&<ProductView product={activeProduct} onBack={()=>handleNav("dashboard")} onLesson={handleOpenLesson}/>}
      {view==="lesson"&&activeLesson&&<LessonView product={activeProduct} module={activeModule} lesson={activeLesson} onBack={()=>setView("product")} onNav={handleNavLesson}/>}
      {view==="account"&&<Account user={user}/>}
      {view==="help"&&<Help/>}
      {view==="admin"&&user.role==="admin"&&<Admin products={products.length?products:DEMO_PRODUCTS} onProductsUpdate={updated=>setSession(s=>({...s,products:updated}))}/>}
      {showSetup&&<SetupGuide onClose={()=>setShowSetup(false)}/>}
      {toast&&(
        <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:"var(--gold)", color:"#1a1a1a", padding:"12px 24px", borderRadius:"var(--radius-lg)", fontFamily:"var(--font-label)", fontSize:13, letterSpacing:"0.08em", boxShadow:"0 4px 20px #00000060", zIndex:1000, whiteSpace:"nowrap" }}>
          {toast}
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
